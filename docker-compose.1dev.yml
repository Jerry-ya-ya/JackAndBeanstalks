name: cmenstudio-dev
services:
  frontend:
    container_name: angular-dev
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Frontend:/app
      - /app/node_modules
      - /app/.angular/cache
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    
  backend:
    container_name: flask-dev
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Backend:/app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    
  db:
    container_name: pg-dev
    image: postgres:16
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data

  redis:
    container_name: redis-dev
    image: redis:latest
    ports:
      - "6379:6379"

  celery_worker:
    container_name: celery-worker-dev
    build:
      context: Backend/celery_worker
      dockerfile: Dockerfile
    command: celery -A celery_worker worker --loglevel=info
    volumes:
      - ./Backend:/app/Backend
    environment:
      - PYTHONPATH=/app/Backend
    env_file:
      - .env
    depends_on:
      - redis
      
  celery_beat:
    build:
      context: Backend/celery_worker
      dockerfile: Dockerfile
    command: celery -A celery_worker beat --loglevel=info
    volumes:
      - ./Backend:/app/Backend
    environment:
      - PYTHONPATH=/app/Backend
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    container_name: celery-beat-dev
volumes:
  pgdata_dev:
