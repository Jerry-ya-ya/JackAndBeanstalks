<main class="cmen-home" [class.day-mode]="!isNightMode">
  <section class="hero-shell" [attr.aria-label]="studioName + ' homepage'">
    <div class="hero-topbar">
      <button
        class="world-toggle"
        type="button"
        (click)="toggleWorldMode()"
        [attr.aria-label]="isNightMode ? 'Switch to day mode' : 'Switch to night mode'"
      >
        <span class="world-toggle__orbit">
          <span class="world-toggle__sun"></span>
          <span class="world-toggle__moon"></span>
        </span>
        <span class="world-toggle__meta">
          <span>{{ countdownLabel }}</span>
          <span>{{ nextModeLabel }}</span>
        </span>
      </button>

      <a class="login-link" [routerLink]="['/' + path.login]">Login</a>
    </div>

    <div class="hero-grid" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="hero-content">
      <div class="studio-mark">
        <img [src]="studioLogo" [alt]="studioLogoAlt">
      </div>

      <p class="studio-kicker">{{ studioKicker }}</p>
      <h1>{{ studioName }}</h1>

      <p class="studio-subtitle">
        <span *ngFor="let word of studioSubtitle">{{ word }}</span>
      </p>
    </div>

    <div class="hero-status" aria-hidden="true">
      <span>BUILD 00.01</span>
      <span>{{ isNightMode ? 'EDEN NIGHT' : 'CMEN DAY' }}</span>
    </div>
  </section>

  <section class="community-news" [attr.aria-label]="communityNewsTitle">
    <div class="community-news__header">
      <p class="studio-kicker">Community Feed</p>
      <h2>{{ communityNewsTitle }}</h2>
      <p>{{ communityNewsIntro }}</p>
    </div>

    <div class="news-grid">
      <article class="news-card" *ngFor="let item of communityNews">
        <div class="news-card__media">
          <img [src]="studioLogo" [alt]="studioLogoAlt">
        </div>
        <div class="news-card__body">
          <span>{{ item.tag }}</span>
          <h3>{{ item.title }}</h3>
          <p>{{ item.summary }}</p>
        </div>
      </article>
    </div>
  </section>
</main>
