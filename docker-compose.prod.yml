version: "3.9"
services:
  frontend:
    image: jerryzheng0907/angular-frontend:latest
    build: ./Frontend
    ports:
      - "4200:80"
    container_name: angular-frontend
  backend:
    image: jerryzheng0907/backend:latest
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
  db:
    image: postgres:16
    restart: always
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    container_name: pg-prod
volumes:
  pgdata_prod: