<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Spring Boot API 同頁測試</title>
  <style>
    body { font-family: "Microsoft JhengHei", system-ui, -apple-system, sans-serif; background:#f7f7f7; margin:0; padding:40px; }
    h1,h2 { color:#333; margin:0 0 12px; }
    section { background:#fff; border:1px solid #ddd; padding:16px; border-radius:10px; margin-bottom:20px; }
    input, button { padding:8px 12px; margin:4px; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { border:1px solid #eee; padding:8px; text-align:left; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .muted { color:#777; font-size:12px; }
    pre { background:#fafafa; border:1px solid #eee; padding:10px; white-space:pre-wrap; }
    .done { text-decoration: line-through; color:#888; }
  </style>
</head>
<body>
  <p>返回使用者介面 <a href="/userhome">按此返回</a></p>
  <h1>Spring Boot API 同頁測試</h1>

  <!-- Hello / Time -->
  <section>
    <h2>基本測試</h2>
    <div class="row">
      <label for="name">名字：</label>
      <input id="name" type="text" placeholder="World" />
      <button id="helloBtn">GET /api/hello</button>
      <button id="timeBtn">GET /api/time</button>
    </div>
    <div class="muted">回應</div>
    <pre id="basicOutput">尚未呼叫</pre>
  </section>

  <!-- TODOIM 面板 -->
  <section>
    <h2>Todo CRUD（In-Memory）</h2>

    <!-- 建立 -->
    <div class="row">
      <input id="newTodoIM" type="text" placeholder="輸入待辦事項標題" />
      <button id="createTodoIM">POST /api/todosIM</button>
      <button id="refreshTodoIM">GET /api/todosIM</button>
      <button id="clearTodoUI" title="只清畫面，不清後端">清畫面</button>
    </div>

    <!-- 清單 -->
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Completed</th><th>操作</th></tr></thead>
      <tbody id="todoIMbody"></tbody>
    </table>
    <div class="muted">最後一次 API 回應</div>
    <pre id="todoIMOutput">尚未呼叫</pre>
  </section>
  
  <!-- TODOSQL 面板 -->
  <section>
    <h2>Todo CRUD（SQL）</h2>

    <!-- 建立 -->
    <div class="row">
      <input id="newTodoSQL" type="text" placeholder="輸入待辦事項標題" />
      <button id="createTodoSQL">POST /api/todosSQL</button>
      <button id="refreshTodoSQL">GET /api/todosSQL</button>
      <button id="clearTodoSQLUI" title="只清畫面，不清後端">清畫面</button>
    </div>

    <!-- 清單 -->
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Completed</th><th>操作</th></tr></thead>
      <tbody id="todoSQLbody"></tbody>
    </table>

    <div class="muted">最後一次 API 回應</div>
    <pre id="todoSQLOutput">尚未呼叫</pre>
  </section>

  <script>
    const basicOutput = document.getElementById('basicOutput');
    
    // ===== Todo IM 相關元素 =====
    const todoIMOutput = document.getElementById('todoIMOutput');
    const todoIMbody = document.getElementById('todoIMbody');
    
    // ===== Todo SQL 相關元素 =====
    const todoSQLOutput = document.getElementById('todoSQLOutput');
    const todoSQLbody = document.getElementById('todoSQLbody');

    // 共用：統一處理 HTTP 回應與錯誤格式
    async function handleResponse(res, outputEl) {
        let text;
        try {
            text = await res.text();   // 先讀 raw，再試著當成 JSON parse
        } catch (e) {
            outputEl.textContent = '讀取回應失敗：' + e;
            throw e;
        }

        if (!text) {
            if (!res.ok) {
                outputEl.textContent = `錯誤（無內容）：HTTP ${res.status}`;
                throw new Error('HTTP ' + res.status);
            }
            outputEl.textContent = '成功（無內容）';
            return null;
        }

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            // 不是 JSON
            if (!res.ok) {
                outputEl.textContent = `錯誤（非 JSON）：HTTP ${res.status}\n` + text;
                throw new Error('HTTP ' + res.status);
            } else {
                outputEl.textContent = text;
                return text;
            }
        }

        // 是 JSON
        if (!res.ok) {
            // 嘗試把我們的 ApiErrorResponse 顯示漂亮一點
            const pretty = {
                status: data.status,
                error: data.error,
                message: data.message,
                errorCode: data.errorCode,
                path: data.path,
                details: data.details
            };
            outputEl.textContent = '錯誤回應：\n' + JSON.stringify(pretty, null, 2);
            throw new Error('HTTP ' + res.status + ' - ' + (data.message || ''));
        } else {
            outputEl.textContent = JSON.stringify(data, null, 2);
            return data;
        }
    }

    // ===== 基本測試 =====
    document.getElementById('helloBtn').addEventListener('click', async () => {
      const name = document.getElementById('name').value || 'World';
      try {
        const res = await fetch(`/api/hello?name=${encodeURIComponent(name)}`);
        await handleResponse(res, basicOutput);
      } catch (e) {
        console.error(e);
      }
    });

    document.getElementById('timeBtn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/time');
        await handleResponse(res, basicOutput);
      } catch (e) {
        console.error(e);
      }
    });
    
    // ===== Todo IM CRUD =====
    async function refreshTodosIM() {
  try {
    // 1. 取得 In-Memory Todos
    const resIM = await fetch('/api/todosIM');
    const imData = await handleResponse(resIM, todoIMOutput);

    renderTodosIM(imData);
    todoIMOutput.textContent = JSON.stringify(imData, null, 2);

    // 2. 取得一般 Todos（帶 query 參數）
    const res = await fetch(baseUrl() + '?' + params.toString());
    const data = await handleResponse(res, todoOutput);
    if (data) {
      renderTodos(data);
    }
  } catch (e) {
    console.error(e);
  }
}

    function renderTodosIM(items) {
      todoIMbody.innerHTML = '';
      for (const t of items) {
        const tr = document.createElement('tr');

        const tdId = document.createElement('td');
        tdId.textContent = t.id;

        const tdTitle = document.createElement('td');
        const span = document.createElement('span');
        span.textContent = t.title;
        if (t.completed) span.classList.add('done');
        tdTitle.appendChild(span);

        const tdCompleted = document.createElement('td');
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = t.completed;
        chk.addEventListener('change', () => toggleCompletedIM(t.id, chk.checked));
        tdCompleted.appendChild(chk);

        const tdOps = document.createElement('td');
        const editBtn = document.createElement('button');
        editBtn.textContent = '改標題';
        editBtn.addEventListener('click', () => renameTitleIM(t.id, span.textContent));
        const delBtn = document.createElement('button');
        delBtn.textContent = '刪除';
        delBtn.addEventListener('click', () => removeTodoIM(t.id));
        tdOps.appendChild(editBtn);
        tdOps.appendChild(delBtn);

        tr.appendChild(tdId);
        tr.appendChild(tdTitle);
        tr.appendChild(tdCompleted);
        tr.appendChild(tdOps);

        todoIMbody.appendChild(tr);
      }
    }

    async function createTodoIM(title) {
      const res = await fetch('/api/todosIM', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const data = await res.json();
      todoIMOutput.textContent = JSON.stringify(data, null, 2);
      await refreshTodosIM();
    }

    async function toggleCompletedIM(id, completed) {
      const res = await fetch(`/api/todosIM/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      const data = await res.json();
      todoIMOutput.textContent = JSON.stringify(data, null, 2);
      await refreshTodosIM();
    }

    async function renameTitleIM(id, oldTitle) {
      const title = prompt('新標題：', oldTitle || '');
      if (title === null) return;
      const res = await fetch(`/api/todosIM/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      if (res.status === 200) {
        const data = await res.json();
        todoIMOutput.textContent = JSON.stringify(data, null, 2);
      } else {
        todoIMOutput.textContent = `更新失敗：HTTP ${res.status}`;
      }
      await refreshTodosIM();
    }

    async function removeTodoIM(id) {
      const ok = confirm(`確定刪除 #${id} ?`);
      if (!ok) return;
      const res = await fetch(`/api/todosIM/${id}`, { method: 'DELETE' });
      if (res.status !== 204) {
        todoIMOutput.textContent = `刪除失敗：HTTP ${res.status}`;
      } else {
        todoIMOutput.textContent = `已刪除 #${id}`;
      }
      await refreshTodosIM();
    }

    // 綁定 Todo IM 按鈕
    document.getElementById('createTodoIM').addEventListener('click', () => {
      const title = document.getElementById('newTodoIM').value.trim();
      if (!title) { alert('請輸入標題'); return; }
      createTodoIM(title);
      document.getElementById('newTodoIM').value = '';
    });

    document.getElementById('refreshTodoIM').addEventListener('click', refreshTodosIM);
    document.getElementById('clearTodoUI').addEventListener('click', () => {
      todoIMbody.innerHTML = ''; todoIMOutput.textContent = '已清畫面（後端資料仍在）';
    });

    // ===== Todo SQL CRUD =====
    async function refreshTodosSQL() {
      const res = await fetch('/api/todosSQL');
      const data = await res.json();
      renderTodosSQL(data);
      todoSQLOutput.textContent = JSON.stringify(data, null, 2);
    }

    function renderTodosSQL(items) {
      todoSQLbody.innerHTML = '';
      for (const t of items) {
        const tr = document.createElement('tr');

        const tdId = document.createElement('td');
        tdId.textContent = t.id;

        const tdTitle = document.createElement('td');
        const span = document.createElement('span');
        span.textContent = t.title;
        if (t.completed) span.classList.add('done');
        tdTitle.appendChild(span);

        const tdCompleted = document.createElement('td');
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = t.completed;
        chk.addEventListener('change', () => toggleCompletedSQL(t.id, chk.checked));
        tdCompleted.appendChild(chk);

        const tdOps = document.createElement('td');
        const editBtn = document.createElement('button');
        editBtn.textContent = '改標題';
        editBtn.addEventListener('click', () => renameTitleSQL(t.id, span.textContent));
        const delBtn = document.createElement('button');
        delBtn.textContent = '刪除';
        delBtn.addEventListener('click', () => removeTodoSQL(t.id));
        tdOps.appendChild(editBtn);
        tdOps.appendChild(delBtn);

        tr.appendChild(tdId);
        tr.appendChild(tdTitle);
        tr.appendChild(tdCompleted);
        tr.appendChild(tdOps);

        todoSQLbody.appendChild(tr);
      }
    }

    async function createTodoSQL(title) {
      const res = await fetch('/api/todosSQL', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const data = await res.json();
      todoSQLOutput.textContent = JSON.stringify(data, null, 2);
      await refreshTodosSQL();
    }

    async function toggleCompletedSQL(id, completed) {
      const res = await fetch(`/api/todosSQL/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      const data = await res.json();
      todoSQLOutput.textContent = JSON.stringify(data, null, 2);
      await refreshTodosSQL();
    }

    async function renameTitleSQL(id, oldTitle) {
      const title = prompt('新標題：', oldTitle || '');
      if (title === null) return;
      const res = await fetch(`/api/todosSQL/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      if (res.status === 200) {
        const data = await res.json();
        todoSQLOutput.textContent = JSON.stringify(data, null, 2);
      } else {
        todoSQLOutput.textContent = `更新失敗：HTTP ${res.status}`;
      }
      await refreshTodosSQL();
    }

    async function removeTodoSQL(id) {
      const ok = confirm(`確定刪除 #${id} ?`);
      if (!ok) return;
      const res = await fetch(`/api/todosSQL/${id}`, { method: 'DELETE' });
      if (res.status !== 204) {
        todoSQLOutput.textContent = `刪除失敗：HTTP ${res.status}`;
      } else {
        todoSQLOutput.textContent = `已刪除 #${id}`;
      }
      await refreshTodosSQL();
    }

    // 綁定 Todo SQL 按鈕
    document.getElementById('createTodoSQL').addEventListener('click', () => {
      const title = document.getElementById('newTodoSQL').value.trim();
      if (!title) { alert('請輸入標題'); return; }
      createTodoSQL(title);
      document.getElementById('newTodoSQL').value = '';
    });

    document.getElementById('refreshTodoSQL').addEventListener('click', refreshTodosSQL);
    document.getElementById('clearTodoSQLUI').addEventListener('click', () => {
      todoSQLbody.innerHTML = ''; todoSQLOutput.textContent = '已清畫面（後端資料仍在）';
    });
  </script>
</body>
</html>
