<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8">
        <title>登入頁面</title>
        <style>
            body { 
                font-family: "Microsoft JhengHei", system-ui, -apple-system, sans-serif; 
                background:#f7f7f7; 
                margin:0; 
                padding:40px; 
            }
            h1, h2 { 
                color:#333; 
                margin:0 0 12px; 
            }
            section { 
                background:#fff; 
                border:1px solid #ddd; 
                padding:16px; 
                border-radius:10px; 
                margin-bottom:20px; 
                max-width:400px;
            }
            input, button { 
                padding:8px 12px; 
                margin:4px; 
                border:1px solid #ddd;
                border-radius:4px;
                font-size:14px;
            }
            input {
                width:100%;
                box-sizing:border-box;
            }
            button {
                background:#007bff;
                color:white;
                border:none;
                cursor:pointer;
                width:100%;
                font-weight:500;
            }
            button:hover {
                background:#0056b3;
            }
            .row {
                display:flex;
                flex-direction:column;
                gap:8px;
                margin-bottom:12px;
            }
            label {
                color:#333;
                font-weight:500;
                margin-bottom:4px;
            }
            .link {
                text-align:center;
                margin-top:16px;
            }
            .link a {
                color:#007bff;
                text-decoration:none;
            }
            .link a:hover {
                text-decoration:underline;
            }
            .error {
                color:#dc3545;
                background:#f8d7da;
                border:1px solid #f5c6cb;
                padding:8px 12px;
                border-radius:4px;
                margin-bottom:12px;
            }
            .success {
                color:#155724;
                background:#d4edda;
                border:1px solid #c3e6cb;
                padding:8px 12px;
                border-radius:4px;
                margin-bottom:12px;
            }
        </style>
    </head>
    <body>
        <section>
            <h2>會員登入</h2>

            <div th:if="${param.error}" class="error">
                帳號或密碼錯誤！
            </div>

            <div th:if="${param.logout}" class="success">
                您已成功登出。
            </div>

            <form action="/perform_login" method="post">
                <div class="row">
                    <label for="username">帳號：</label>
                    <input type="text" id="username" name="username" placeholder="請輸入帳號" required />
                </div>
                <div class="row">
                    <label for="password">密碼：</label>
                    <input type="password" id="password" name="password" placeholder="請輸入密碼" required />
                </div>
                <button type="submit">登入</button>
            </form>

            <div class="link">
                <p>還沒有帳號嗎？ <a href="/register">按此註冊</a></p>
            </div>
        </section>
    </body>
</html>
