server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://${DB_SERVER:db}:${DB_PORT:5432}/${DB_NAME:your_SQLname}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # 讓表結構交給 Flyway，避免 Hibernate 自動亂改
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # 告訴 Spring：等 Hibernate 建立/更新完表結構後，再執行 data.sql
    defer-datasource-initialization: true
  sql:
      init:
        mode: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
